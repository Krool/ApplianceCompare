<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Chef's Choice — Kitchen Appliance Research, 2026</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* override the variable to use the loaded font */
    :root { --serif: 'Source Serif 4', 'Charter', Georgia, serif; }

    /* Initial loading skeleton — replaced by React when data arrives */
    .boot {
      max-width: 1600px; margin: 0 auto; padding: 14px 24px 40px;
      font-family: 'Inter Tight', system-ui, sans-serif; color: #6b6557;
    }
    .boot-head { display: flex; align-items: baseline; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid #e6e0d4; }
    .boot-mark { font-family: 'Source Serif 4', Georgia, serif; font-size: 22px; font-weight: 600; color: #1a1814; }
    .boot-mark em { font-style: italic; color: #b8431f; font-weight: 500; }
    .boot-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
    .boot-rows { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .boot-row { height: 40px; border-radius: 8px; background: linear-gradient(90deg, #f1ede5 0%, #e6e0d4 50%, #f1ede5 100%); background-size: 200% 100%; animation: boot-shimmer 1.2s linear infinite; }
    @keyframes boot-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    @media (prefers-reduced-motion: reduce) { .boot-row { animation: none; } }
  </style>

  <!-- Preload JSON data so the network fetch runs in parallel with JS parse -->
  <link rel="preload" as="fetch" href="./data/brands.json" crossorigin />
  <link rel="preload" as="fetch" href="./data/refrigerators.json" crossorigin />
  <link rel="preload" as="fetch" href="./data/dishwashers.json" crossorigin />
  <link rel="preload" as="fetch" href="./data/ovens.json" crossorigin />
  <link rel="preload" as="fetch" href="./data/buying-guide.json" crossorigin />
  <script type="module" crossorigin src="./assets/index-BUkNHl-Z.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C6qK6d4p.css">
</head>
<body>
  <div id="root">
    <div class="boot" role="status" aria-label="Loading kitchen appliance data">
      <div class="boot-head">
        <span class="boot-mark">Chef's <em>Choice</em></span>
        <span class="boot-tag">Loading kitchen appliance research…</span>
      </div>
      <div class="boot-rows">
        <div class="boot-row"></div>
        <div class="boot-row"></div>
        <div class="boot-row"></div>
        <div class="boot-row"></div>
        <div class="boot-row"></div>
        <div class="boot-row"></div>
      </div>
    </div>
  </div>
</body>
</html>
